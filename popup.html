<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meet AI Assistant</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 320px;
        font-family: Arial, sans-serif;
        background: #202124;
        color: #e8eaed;
      }
      .label {
        font-size: 12px;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #5f6368;
        border-radius: 8px;
        padding: 8px;
        background: #303134;
        color: #e8eaed;
      }
      .row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      #save-btn {
        background: #1a73e8;
        color: #fff;
      }
      #clear-btn {
        background: #5f6368;
        color: #fff;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #9aa0a6;
      }
    </style>
  </head>
  <body>
    <div class="label">Gemini API Key</div>
    <input id="api-key-input" type="password" placeholder="Paste your key here" />
    <div class="row">
      <button id="save-btn" type="button">Save</button>
      <button id="clear-btn" type="button">Clear</button>
    </div>
    <div id="status">Not saved</div>
    <script src="popup.js"></script>
  </body>
</html>
